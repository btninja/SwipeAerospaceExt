name: Distribute SwipeAeroSpaceExtended

on:
  push:
    tags:
      - '*'

jobs:
  build-and-distribute:
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: "Select Xcode (Default)"
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Build and export app
        run: |
          xcodebuild -scheme SwipeAeroSpace -configuration Release -derivedDataPath build -destination "generic/platform=macOS"

      - name: Make Release Dmg
        run: |
          hdiutil create temp.dmg -ov -volname "SwipeAeroSpaceExtended" -fs HFS+ -srcfolder "build/Build/Products/Release/SwipeAeroSpaceExtended.app"
          hdiutil convert temp.dmg -format UDZO -o "SwipeAeroSpaceExtended.dmg"

      - name: Make Release Zip
        run: |
          cp -r "build/Build/Products/Release/SwipeAeroSpaceExtended.app" "SwipeAeroSpaceExtended.app"
          zip -r "SwipeAeroSpaceExtended.zip" "SwipeAeroSpaceExtended.app"

      - name: Upload a Build Artifact
        id: upload_artifact
        uses: actions/upload-artifact@v4
        with:
          name: SwipeAeroSpaceExtended
          path: "SwipeAeroSpaceExtended.dmg"

      - name: Release to GitHub
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.CUSTOM_GITHUB_TOKEN }}
          files: |
            SwipeAeroSpaceExtended.dmg
            SwipeAeroSpaceExtended.zip
